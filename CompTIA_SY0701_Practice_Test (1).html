<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CompTIA Security+ SY0-701 Practice Test</title>
<style>
  :root {
    --navy: #0a1628; --navy2: #112244; --blue: #1a3a6b;
    --accent: #2563eb; --accent2: #3b82f6; --gold: #f59e0b;
    --green: #22c55e; --red: #ef4444;
    --text: #e8edf5; --text2: #94a3b8; --card: #152035; --border: #1e3a5f;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--navy); color: var(--text); min-height: 100vh; }

  header {
    background: linear-gradient(135deg, var(--navy2) 0%, var(--blue) 100%);
    border-bottom: 2px solid var(--accent);
    padding: 14px 20px;
    display: flex; align-items: center; justify-content: space-between;
    flex-wrap: wrap; gap: 10px;
    position: sticky; top: 0; z-index: 100;
    box-shadow: 0 4px 20px rgba(0,0,0,0.4);
  }
  .header-left { display: flex; align-items: center; gap: 12px; }
  .bl-logo {
    width: 40px; height: 40px; background: var(--navy);
    border: 2px solid var(--accent); border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-weight: 900; font-size: 13px; letter-spacing: -1px; flex-shrink: 0;
  }
  .bl-logo span:first-child { color: #00D4FF; }
  .bl-logo span:last-child { color: #7B2FBE; }
  .header-title h1 { font-size: 1rem; font-weight: 700; }
  .header-title p { font-size: 0.72rem; color: var(--text2); }
  .header-stats { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
  .stat-chip {
    background: rgba(37,99,235,0.2); border: 1px solid var(--accent);
    border-radius: 20px; padding: 4px 12px; font-size: 0.78rem; font-weight: 600; white-space: nowrap;
  }
  .stat-chip.green { background: rgba(34,197,94,0.15); border-color: var(--green); color: var(--green); }
  .stat-chip.red { background: rgba(239,68,68,0.15); border-color: var(--red); color: var(--red); }
  .stat-chip.gold { background: rgba(245,158,11,0.15); border-color: var(--gold); color: var(--gold); }

  .progress-wrap { background: var(--border); height: 4px; }
  .progress-bar { height: 100%; background: linear-gradient(90deg, var(--accent), #06b6d4); transition: width 0.4s ease; }

  .main { max-width: 860px; margin: 0 auto; padding: 20px 16px; }

  .controls { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; align-items: center; }
  .btn {
    padding: 8px 16px; border: none; border-radius: 8px;
    font-size: 0.82rem; font-weight: 600; cursor: pointer; transition: all 0.2s;
    display: inline-flex; align-items: center; gap: 5px;
  }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: var(--accent2); transform: translateY(-1px); }
  .btn-secondary { background: var(--card); color: var(--text2); border: 1px solid var(--border); }
  .btn-secondary:hover { background: var(--border); color: var(--text); }
  .btn-danger { background: rgba(239,68,68,0.15); color: var(--red); border: 1px solid var(--red); }
  .btn-danger:hover { background: rgba(239,68,68,0.3); }
  .mode-select {
    background: var(--card); color: var(--text); border: 1px solid var(--border);
    border-radius: 8px; padding: 8px 10px; font-size: 0.82rem; cursor: pointer;
  }
  .search-input {
    flex: 1; min-width: 150px; background: var(--card); color: var(--text);
    border: 1px solid var(--border); border-radius: 8px; padding: 8px 12px; font-size: 0.82rem;
  }
  .search-input::placeholder { color: var(--text2); }
  .search-input:focus { outline: 2px solid var(--accent); }

  .question-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 14px; padding: 26px; margin-bottom: 18px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.3);
  }
  .q-meta { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
  .q-num { font-size: 0.76rem; color: var(--accent2); font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }
  .flag-btn {
    background: none; border: 1px solid var(--border); color: var(--text2);
    border-radius: 6px; padding: 3px 10px; font-size: 0.74rem; cursor: pointer; transition: all 0.2s;
  }
  .flag-btn.flagged { background: rgba(245,158,11,0.2); border-color: var(--gold); color: var(--gold); }
  .q-text { font-size: 0.97rem; line-height: 1.65; color: var(--text); margin-bottom: 22px; font-weight: 500; }

  .options { display: flex; flex-direction: column; gap: 9px; }
  .option {
    display: flex; align-items: flex-start; gap: 12px;
    background: rgba(255,255,255,0.03); border: 1.5px solid var(--border);
    border-radius: 10px; padding: 13px 14px; cursor: pointer; transition: all 0.18s;
    user-select: none;
  }
  .option:hover:not(.disabled) { background: rgba(37,99,235,0.1); border-color: var(--accent2); transform: translateX(3px); }
  .option.selected { background: rgba(37,99,235,0.15); border-color: var(--accent); }
  .option.correct { background: rgba(34,197,94,0.12); border-color: var(--green); }
  .option.wrong { background: rgba(239,68,68,0.1); border-color: var(--red); }
  .option.reveal-correct { background: rgba(34,197,94,0.06); border-color: rgba(34,197,94,0.4); }
  .option.disabled { cursor: default; }
  .opt-letter {
    width: 28px; height: 28px; min-width: 28px; border-radius: 6px;
    background: var(--border); display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 0.83rem; color: var(--text2); transition: all 0.18s;
  }
  .option.selected .opt-letter { background: var(--accent); color: #fff; }
  .option.correct .opt-letter { background: var(--green); color: #fff; }
  .option.wrong .opt-letter { background: var(--red); color: #fff; }
  .option.reveal-correct .opt-letter { background: rgba(34,197,94,0.5); color: #fff; }
  .opt-text { font-size: 0.88rem; line-height: 1.5; padding-top: 4px; flex: 1; }
  .opt-icon { margin-left: auto; font-size: 1rem; padding-top: 4px; flex-shrink: 0; }

  .feedback {
    margin-top: 16px; padding: 13px 16px; border-radius: 10px;
    font-size: 0.88rem; line-height: 1.5; display: none;
  }
  .feedback.show-correct { background: rgba(34,197,94,0.12); border: 1px solid var(--green); color: #86efac; display: block; }
  .feedback.show-wrong { background: rgba(239,68,68,0.1); border: 1px solid var(--red); color: #fca5a5; display: block; }

  .nav-row { display: flex; justify-content: space-between; align-items: center; gap: 10px; flex-wrap: wrap; }
  .nav-center { display: flex; gap: 8px; }

  #results-panel {
    display: none; background: var(--card); border: 1px solid var(--border);
    border-radius: 14px; padding: 32px; text-align: center; margin-top: 20px;
  }
  .score-ring-wrap { display: flex; justify-content: center; margin-bottom: 16px; }
  .score-ring { position: relative; width: 120px; height: 120px; }
  .score-ring svg { transform: rotate(-90deg); }
  .score-ring-text {
    position: absolute; inset: 0;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
  }
  .score-ring-pct { font-size: 1.6rem; font-weight: 900; }
  .score-ring-lbl { font-size: 0.63rem; color: var(--text2); text-transform: uppercase; }
  .results-grade { font-size: 1.3rem; font-weight: 700; margin: 8px 0 18px; }
  .results-stats { display: flex; gap: 22px; justify-content: center; flex-wrap: wrap; margin: 16px 0; }
  .res-stat { text-align: center; }
  .res-stat-val { font-size: 1.7rem; font-weight: 800; }
  .res-stat-label { font-size: 0.73rem; color: var(--text2); text-transform: uppercase; }

  .q-grid-wrap {
    margin-top: 22px; background: var(--card); border: 1px solid var(--border);
    border-radius: 12px; padding: 14px;
  }
  .q-grid-title { font-size: 0.77rem; color: var(--text2); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 9px; font-weight: 600; }
  .q-grid { display: flex; flex-wrap: wrap; gap: 4px; max-height: 140px; overflow-y: auto; }
  .q-dot {
    width: 28px; height: 28px; border-radius: 5px; border: 1px solid var(--border);
    background: var(--navy2); color: var(--text2);
    font-size: 0.63rem; font-weight: 600;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; transition: all 0.12s;
  }
  .q-dot:hover { border-color: var(--accent2); color: var(--text); }
  .q-dot.answered { background: rgba(37,99,235,0.2); border-color: var(--accent); color: var(--accent2); }
  .q-dot.correct-dot { background: rgba(34,197,94,0.2); border-color: var(--green); color: var(--green); }
  .q-dot.wrong-dot { background: rgba(239,68,68,0.15); border-color: var(--red); color: var(--red); }
  .q-dot.current { border-color: var(--gold) !important; box-shadow: 0 0 0 2px rgba(245,158,11,0.3); }
  .q-dot.flagged-dot::after { content: ""; position: absolute; top: 2px; right: 2px; width: 5px; height: 5px; background: var(--gold); border-radius: 50%; }
  .q-dot { position: relative; }

  .btn-results { background: var(--gold); color: #111; }
  .btn-results:hover { background: #fbbf24; }

  @media (max-width: 600px) {
    .header-stats { display: none; }
    .question-card { padding: 16px; }
    .results-grade { font-size: 1.1rem; }
  }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <div class="bl-logo"><span>B</span><span>L</span></div>
    <div class="header-title">
      <h1>CompTIA Security+ SY0-701</h1>
      <p>Practice Test &bull; 511 Questions</p>
    </div>
  </div>
  <div class="header-stats">
    <div class="stat-chip" id="stat-progress">Q 1 / 511</div>
    <div class="stat-chip green" id="stat-correct">✓ 0</div>
    <div class="stat-chip red" id="stat-wrong">✗ 0</div>
    <div class="stat-chip gold" id="stat-score">0%</div>
  </div>
</header>

<div class="progress-wrap">
  <div class="progress-bar" id="progress-bar" style="width:0%"></div>
</div>

<div class="main">
  <div class="controls">
    <input type="text" class="search-input" id="search-input" placeholder="🔍 Q# or keyword, then Enter...">
    <select class="mode-select" id="mode-select">
      <option value="study">📖 Study Mode</option>
      <option value="exam">🎓 Exam Mode</option>
    </select>
    <select class="mode-select" id="quiz-size-select">
      <option value="all">All 511 Qs</option>
      <option value="10">10 Questions</option>
      <option value="20">20 Questions</option>
      <option value="30">30 Questions</option>
      <option value="50">50 Questions</option>
    </select>
    <button class="btn btn-primary" onclick="startQuiz()" id="btn-start">▶ Start</button>
    <button class="btn btn-secondary" onclick="shuffleQuestions()">🔀 Shuffle</button>
    <button class="btn btn-secondary" onclick="showFlagged()">🚩 Flagged (<span id="flag-count">0</span>)</button>
    <button class="btn btn-danger" onclick="resetAll()">↺ Reset</button>
  </div>

  <div id="question-area">
    <div class="question-card" id="question-card">
      <div class="q-meta">
        <span class="q-num" id="q-num">Question 1 of 511</span>
        <button class="flag-btn" id="flag-btn" onclick="toggleFlag()">🚩 Flag</button>
      </div>
      <div class="q-text" id="q-text"></div>
      <div class="options" id="options-container"></div>
      <div class="feedback" id="feedback"></div>
    </div>

    <div class="nav-row">
      <button class="btn btn-secondary" onclick="navigate(-1)">← Prev</button>
      <div class="nav-center">
        <button class="btn btn-primary" onclick="submitAnswer()" id="btn-submit">Check Answer</button>
        <button class="btn btn-secondary" onclick="navigate(1)">Next →</button>
      </div>
      <button class="btn btn-results" onclick="showResults()">📊 Results</button>
    </div>
  </div>

  <div id="results-panel">
    <div class="score-ring-wrap">
      <div class="score-ring">
        <svg viewBox="0 0 120 120" width="120" height="120">
          <circle cx="60" cy="60" r="50" fill="none" stroke="var(--border)" stroke-width="10"/>
          <circle cx="60" cy="60" r="50" fill="none" stroke="var(--accent)" stroke-width="10"
            stroke-dasharray="314" stroke-dashoffset="314" id="ring-circle" stroke-linecap="round"/>
        </svg>
        <div class="score-ring-text">
          <span class="score-ring-pct" id="ring-pct">0%</span>
          <span class="score-ring-lbl">Score</span>
        </div>
      </div>
    </div>
    <div class="results-grade" id="results-grade"></div>
    <div class="results-stats">
      <div class="res-stat"><div class="res-stat-val" id="r-answered" style="color:var(--accent2)">0</div><div class="res-stat-label">Answered</div></div>
      <div class="res-stat"><div class="res-stat-val" id="r-correct" style="color:var(--green)">0</div><div class="res-stat-label">Correct</div></div>
      <div class="res-stat"><div class="res-stat-val" id="r-wrong" style="color:var(--red)">0</div><div class="res-stat-label">Wrong</div></div>
      <div class="res-stat"><div class="res-stat-val" id="r-remaining" style="color:var(--text2)">0</div><div class="res-stat-label">Remaining</div></div>
    </div>
    <div style="margin-top:14px;font-size:0.88rem;color:var(--text2)">CompTIA passing score: <strong style="color:var(--gold)">750/900 (~83%)</strong></div>
    <div style="margin-top:18px;display:flex;gap:10px;justify-content:center;flex-wrap:wrap;">
      <button class="btn btn-primary" onclick="closeResults()">← Continue Practice</button>
      <button class="btn btn-secondary" onclick="reviewWrong()">Review Wrong Answers</button>
      <button class="btn btn-danger" onclick="resetAll()">↺ Start Over</button>
    </div>
  </div>

  <div class="q-grid-wrap" id="q-grid-wrap">
    <div class="q-grid-title">Question Navigator</div>
    <div class="q-grid" id="q-grid"></div>
  </div>
</div>

<script>
// ─── Data ───────────────────────────────────────────────────────────────────
const ALL_QUESTIONS = [{"num": 1, "q": "Which of the following is prevented by proper data sanitization?", "A": "Hackers' ability to obtain data from used hard drives", "B": "Devices reaching end-of-life and losing support", "C": "Disclosure of sensitive data through incorrect classification", "D": "Incorrect inventory data leading to a laptop shortage", "answer": "A"}, {"num": 2, "q": "Which of the following organizational documents is most often used to establish and communicate expectations associated with integrity and ethical behavior within an organization?", "A": "AUP", "B": "SLA", "C": "EULA", "D": "MOA", "answer": "A"}, {"num": 3, "q": "A U.S.-based cloud-hosting provider wants to expand its data centers to new international locations. Which of the following should the hosting provider consider first?", "A": "Local data protection regulations", "B": "Risks from hackers residing in other countries", "C": "Impacts to existing contractual obligations", "D": "Time zone differences in log correlation", "answer": "A"}, {"num": 4, "q": "Two companies are in the process of merging. The companies need to decide how to standardize their information security programs. Which of the following would best align the security programs?", "A": "Shared deployment of CIS baselines", "B": "Joint cybersecurity best practices", "C": "Both companies following the same CSF", "D": "Assessment of controls in a vulnerability report", "answer": "C"}, {"num": 5, "q": "A systems administrator wants to prevent users from being able to access data based on their responsibilities. The administrator also wants to apply the required access structure via a simplified format. Which of the following should the administrator apply to the site recovery resource group?", "A": "RBAC", "B": "ACL", "C": "SAML", "D": "GPO", "answer": "A"}, {"num": 6, "q": "During a SQL update of a database, a temporary field that was created was replaced by an attacker in order to allow access to the system. Which of the following best describes this type of vulnerability?", "A": "Race condition", "B": "Memory injection", "C": "Malicious update", "D": "Side loading", "answer": "A"}, {"num": 7, "q": "A user needs to complete training at https://comptiatraining.com. After manually entering the URL, the user sees that the accessed website is noticeably different from the standard company website. Which of the following is the most likely explanation for the difference?", "A": "Cross-site scripting", "B": "Pretexting", "C": "Typosquatting", "D": "Vishing", "answer": "C"}, {"num": 8, "q": "A company is planning a disaster recovery site and needs to ensure that a single natural disaster would not result in the complete loss of regulated backup data. Which of the following should the company consider?", "A": "Geographic dispersion", "B": "Platform diversity", "C": "Hot site", "D": "Load balancing", "answer": "A"}, {"num": 9, "q": "Which of the following methods would most likely be used to identify legacy systems?", "A": "Bug bounty program", "B": "Vulnerability scan", "C": "Package monitoring", "D": "Dynamic analysis", "answer": "B"}, {"num": 10, "q": "Which of the following control types involves restricting IP connectivity to a router's web management interface to protect it from being exploited by a vulnerability?", "A": "Corrective", "B": "Physical", "C": "Preventive", "D": "Managerial", "answer": "C"}, {"num": 11, "q": "A security consultant is working with a client that wants to physically isolate its secure systems. Which of the following best describes this architecture?", "A": "SDN", "B": "Air gapped", "C": "Containerized D.", "D": "Highly available", "answer": "B"}, {"num": 12, "q": "The Chief Information Security Officer wants to discuss options for a disaster recovery site that allows the business to resume operations as quickly as possible. Which of the following solutions meets this requirement?", "A": "Hot site", "B": "Cold site", "C": "Geographic dispersion", "D": "Warm site", "answer": "A"}, {"num": 13, "q": "Which of the following security concepts is the best reason for permissions on a human resources fileshare to follow the principle of least privilege?", "A": "Integrity", "B": "Availability", "C": "Confidentiality", "D": "Non-repudiation", "answer": "C"}, {"num": 14, "q": "A security analyst is prioritizing vulnerability scan results using a risk-based approach. Which of the following is the most efficient resource for the analyst to use?", "A": "Business impact analysis", "B": "Common Vulnerability Scoring System", "C": "Risk register", "D": "Exposure factor", "answer": "B"}, {"num": 15, "q": "A security analyst scans a company's public network and discovers a host is running a remote desktop that can be used to access the production network. Which of the following changes should the security analyst recommend?", "A": "Changing the remote desktop port to a non-standard number", "B": "Setting up a VPN and placing the jump server inside the firewall", "C": "Using a proxy for web connections from the remote desktop server", "D": "Connecting the remote server to the domain and increasing the password length", "answer": "B"}, {"num": 16, "q": "A business uses Wi-Fi with content filleting enabled. An employee noticed a coworker accessed a blocked sue from a work computer and repotted the issue. While Investigating the issue, a security administrator found another device providing internet access to certain employees. Which of the following best describes the security risk?", "A": "The host-based security agent Is not running on all computers.", "B": "A rogue access point Is allowing users to bypass controls.", "C": "Employees who have certain credentials are using a hidden SSID.", "D": "A valid access point is being jammed to limit availability.", "answer": "B"}, {"num": 17, "q": "A security analyst is creating base for the server team to follow when hardening new devices for deployment. Which of the following beet describes what the analyst is creating? A.", "A": "Change management procedure", "B": "Information security policy", "C": "Cybersecurity framework", "D": "Secure configuration guide", "answer": "D"}, {"num": 18, "q": "A systems administrate wants to implement a backup solution. the solution needs to allow recovery of the entire system, including the operating system, in case of a disaster. Which of the following backup types should the administrator consider?", "A": "Incremental", "B": "Storage area network", "C": "Differential", "D": "Image", "answer": "D"}, {"num": 19, "q": "Which of the following best describes the practice of researching laws and regulations related to information security operations within a specific industry?", "A": "Compliance reporting", "B": "GDPR", "C": "Due diligence", "D": "Attestation", "answer": "C"}, {"num": 20, "q": "An employee in the accounting department receives an email containing a demand for payment tot services performed by a vendor However, the vendor is not in the vendor management database. Which of the following in this scenario an example of?", "A": "Pretexting", "B": "Impersonation", "C": "Ransomware", "D": "Invoice scam", "answer": "D"}, {"num": 21, "q": "Which of the following is used to validate a certificate when it is presented to a user?", "A": "OCSP", "B": "CSR", "C": "CA", "D": "CRC", "answer": "A"}, {"num": 22, "q": "A company requires hard drives to be securely wiped before sending decommissioned systems to recycling. Which of the following best describes this policy?", "A": "Enumeration", "B": "Sanitization", "C": "Destruction", "D": "Inventory", "answer": "B"}, {"num": 23, "q": "Which of the following is the most common data loss path for an air-gapped network?", "A": "Bastion host", "B": "Unsecured Bluetooth", "C": "Unpatched OS", "D": "Removable devices", "answer": "D"}, {"num": 24, "q": "The internal audit team determines a software application is no longer in scope for external reporting requirements. Which of the following will confirm management\u2019s perspective that the application is no longer applicable?", "A": "Data inventory and retention", "B": "Right to be forgotten", "C": "Due care and due diligence", "D": "Acknowledgement and attestation", "answer": "D"}, {"num": 25, "q": "A systems administrator receives the following alert from a file integrity monitoring tool: The hash of the cmd.exe file has changed. The systems administrator checks the OS logs and notices that no patches were applied in the last two months. Which of the following most likely occurred?", "A": "The end user changed the file permissions.", "B": "A cryptographic collision was detected.", "C": "A snapshot of the file system was taken.", "D": "A rootkit was deployed.", "answer": "D"}, {"num": 26, "q": "Which of the following activities should be performed first to compile a list of vulnerabilities in an environment?", "A": "Automated scanning", "B": "Penetration testing", "C": "Threat hunting", "D": "Log aggregation E. Adversarial emulation", "answer": "A"}, {"num": 27, "q": "Which of the following security concepts is accomplished with the installation of a RADIUS server?", "A": "CIA", "B": "AA", "C": "ACL", "D": "PEM", "answer": "B"}, {"num": 28, "q": "A business needs a recovery site but does not require immediate failover. The business also wants to reduce the workload required to recover from an outage. Which of the following recovery sites is the best option?", "A": "Hot", "B": "Cold", "C": "Warm", "D": "Geographically dispersed", "answer": "C"}, {"num": 29, "q": "A company wants to ensure employees are allowed to copy files from a virtual desktop during the workday but are restricted during non-working hours. Which of the following security measures should the company set up?", "A": "Digital rights management", "B": "Role-based access control", "C": "Time-based access control", "D": "Network access control", "answer": "C"}, {"num": 30, "q": "Which of the following activities are associated wit ulated threats", "C": "Phishing awareness", "D": "Business continuity planning", "answer": "A"}, {"num": 301, "q": "While considering the organization's cloud-adoption strategy, the Chief Information Security Officer sets a goal to outsource patching of firmware, operating systems, and applications to the chosen cloud vendor. Which of the following best meets this goal?", "A": "Community cloud", "B": "PaaS", "C": "Containerization", "D": "Private cloud E. SaaS F. laaS Answer: E Explanation Software as a Service (SaaS) is the cloud model that best meets the goal of outsourcing the management, including patching, of firmware, operating systems, and applications to the cloud vendor. In a SaaS environment, the cloud provider is responsible for maintaining and updating the entire software stack, allowing the organization to focus on using the software rather than managing its infrastructure. References = CompTIA Security+ SY0-701 study materials, particularly the domains related to cloud security models. Question #:302 Which of the following strategies should an organization use to efficiently manage and analyze multiple types of logs? A. Deploy a SIEM solution B. Create custom scripts to aggregate and analyze logs C. Implement EDR technology D. Install a unified threat management appliance", "answer": "A"}, {"num": 303, "q": "A customer has a contract with a CSP and wants to identify which controls should be implemented in the IaaS enclave. Which of the following is most likely to contain this information?", "A": "Statement of work", "B": "Responsibility matrix", "C": "Service-level agreement", "D": "Master service agreement", "answer": "B"}, {"num": 304, "q": "A company is using a legacy FTP server to transfer financial data to a third party. The legacy system does not support SFTP, so a compensating control is needed to protect the sensitive, financial data in transit. Which of the following would be the most appropriate for the company to use?", "A": "Telnet connecti er authentication of the system F. Reduced complexity of the system", "answer": "C"}, {"num": 507, "q": "A customer of a large company receives a phone call from someone claiming to work for the company and asking for the customer's credit card information. The customer sees the caller ID is the same as the company's main phone number. Which of the following attacks is the customer most likely a target of?", "A": "Phishing", "B": "Whaling", "C": "Smishing", "D": "Vishing", "answer": "D"}, {"num": 508, "q": "Which of the following allows for the attribution of messages to individuals?", "A": "Adaptive identity", "B": "Non-repudiation", "C": "Authentication", "D": "Access logs", "answer": "B"}, {"num": 509, "q": "Which of the following should an organization use to protect its environment from external attacks conducted by an unauthorized hacker?", "A": "ACL", "B": "IDS", "C": "HIDS", "D": "NIPS", "answer": "B"}, {"num": 510, "q": "A security report shows that during a two-week test period. 80% of employees unwittingly disclosed their SSO credentials when accessing an external website. The organization purposely created the website to simulate a cost-free password complexity test. Which of the following would best help reduce the number of visits to similar websites in the future?", "A": "Block all outbound traffic from the intranet.", "B": "Introduce a campaign to recognize phishing attempts.", "C": "Restrict internet access for the employees who disclosed credentials.", "D": "Implement a deny list of websites.", "answer": "B"}, {"num": 511, "q": "A company is developing a business continuity strategy and needs to determine how many staff members would be required to sustain the business in the case of a disruption. Which of the following best describes this step?", "A": "Capacity planning", "B": "Redundancy", "C": "Geographic dispersion", "D": "Tablet exercise", "answer": "A"}, {"num": 512, "q": "A company is expanding its threat surface program and allowing individ um": 518, "q": "An enterprise security team is researching a new security architecture to better protect the company's networks and applications against the latest cyberthreats. The company has a fully remote workforce. The solution should be highly redundant and enable users to connect to a VPN with an integrated, software-based firewall. Which of the following solutions meets these requirements?", "A": "IPS", "B": "SIEM", "C": "SASE", "D": "CASB", "answer": "B"}];

// ─── State ──────────────────────────────────────────────────────────────────
let questions     = [...ALL_QUESTIONS];
let currentIdx    = 0;
let answers       = {};          // index → letter chosen
let flagged       = new Set();   // set of indices in current questions array
let mode          = 'study';     // 'study' | 'exam'
let selectedLetter = null;

// ─── Init ────────────────────────────────────────────────────────────────────
function init() {
  buildGrid();
  renderQuestion(0);
  updateStats();
}

// ─── Grid ────────────────────────────────────────────────────────────────────
function buildGrid() {
  const grid = document.getElementById('q-grid');
  grid.innerHTML = '';
  questions.forEach((q, i) => {
    const dot = document.createElement('div');
    dot.className = 'q-dot';
    dot.textContent = q.num;
    dot.id = 'qdot-' + i;
    dot.onclick = () => goTo(i);
    grid.appendChild(dot);
  });
}

function refreshGridDot(i) {
  const dot = document.getElementById('qdot-' + i);
  if (!dot) return;
  dot.className = 'q-dot';
  const q = questions[i];
  if (i === currentIdx)  dot.classList.add('current');
  if (flagged.has(i))    dot.classList.add('flagged-dot');
  if (answers[i] != null) {
    dot.classList.add(answers[i] === q.answer ? 'correct-dot' : 'wrong-dot');
  }
}

function refreshAllDots() {
  questions.forEach((_, i) => refreshGridDot(i));
}

// ─── Render question ─────────────────────────────────────────────────────────
function renderQuestion(idx) {
  if (idx < 0 || idx >= questions.length) return;
  currentIdx = idx;
  const q = questions[idx];
  const answered = answers[idx];  // letter or undefined

  document.getElementById('q-num').textContent =
    'Question ' + (idx + 1) + ' of ' + questions.length + '  (Q#' + q.num + ')';
  document.getElementById('q-text').textContent = q.q || '(Question text not available for this item)';

  // Options
  const container = document.getElementById('options-container');
  container.innerHTML = '';
  selectedLetter = null;

  ['A','B','C','D'].forEach(letter => {
    const div = document.createElement('div');
    let classes = 'option';
    if (answered) {
      classes += ' disabled';
      if (letter === q.answer && answered === q.answer) classes += ' correct';     // picked correct
      else if (letter === q.answer)                     classes += ' reveal-correct'; // show right answer
      else if (letter === answered)                     classes += ' wrong';       // picked wrong
    }
    div.className = classes;
    if (!answered) div.addEventListener('click', () => selectOption(letter));

    const icon = answered
      ? (letter === q.answer ? '✅' : (letter === answered ? '❌' : ''))
      : '';

    div.innerHTML =
      '<div class="opt-letter">' + letter + '</div>' +
      '<div class="opt-text">' + (q[letter] || '') + '</div>' +
      '<div class="opt-icon">' + icon + '</div>';

    container.appendChild(div);
  });

  // Submit button
  const btn = document.getElementById('btn-submit');
  if (answered) {
    btn.textContent = 'Answered ✓';
    btn.disabled = true;
    btn.style.opacity = '0.5';
  } else {
    btn.textContent = 'Check Answer';
    btn.disabled = false;
    btn.style.opacity = '1';
  }

  // Feedback (study mode only)
  const fb = document.getElementById('feedback');
  if (answered && mode === 'study') {
    const correct = answered === q.answer;
    fb.className = 'feedback ' + (correct ? 'show-correct' : 'show-wrong');
    fb.textContent = correct
      ? '✅ Correct! ' + q.answer + ': ' + q[q.answer]
      : '❌ Incorrect. Correct answer is ' + q.answer + ': ' + q[q.answer];
  } else {
    fb.className = 'feedback';
  }

  // Flag button
  const flagBtn = document.getElementById('flag-btn');
  if (flagged.has(idx)) {
    flagBtn.className = 'flag-btn flagged';
    flagBtn.textContent = '🚩 Flagged';
  } else {
    flagBtn.className = 'flag-btn';
    flagBtn.textContent = '🚩 Flag';
  }

  refreshAllDots();
  updateProgress();
  updateStats();
}

// ─── Option selection ────────────────────────────────────────────────────────
function selectOption(letter) {
  if (answers[currentIdx] != null) return;
  selectedLetter = letter;
  document.querySelectorAll('.option').forEach(o => {
    o.classList.remove('selected');
    if (o.querySelector('.opt-letter') &&
        o.querySelector('.opt-letter').textContent === letter) {
      o.classList.add('selected');
    }
  });
}

// ─── Submit ──────────────────────────────────────────────────────────────────
function submitAnswer() {
  if (answers[currentIdx] != null) return;
  if (!selectedLetter) { alert('Please select an answer first!'); return; }
  answers[currentIdx] = selectedLetter;
  renderQuestion(currentIdx);
}

// ─── Navigation ──────────────────────────────────────────────────────────────
function navigate(dir) {
  const next = currentIdx + dir;
  if (next >= 0 && next < questions.length) renderQuestion(next);
}

function goTo(idx) {
  renderQuestion(idx);
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ─── Flag ────────────────────────────────────────────────────────────────────
function toggleFlag() {
  if (flagged.has(currentIdx)) flagged.delete(currentIdx);
  else flagged.add(currentIdx);
  document.getElementById('flag-count').textContent = flagged.size;
  renderQuestion(currentIdx);
}

// ─── Stats ───────────────────────────────────────────────────────────────────
function updateStats() {
  const keys = Object.keys(answers);
  const answeredCount = keys.length;
  const correctCount = keys.filter(i => answers[i] === questions[+i] && questions[+i] ? answers[i] === questions[+i].answer : false).length;
  const wrongCount = answeredCount - correctCount;
  const pct = answeredCount > 0 ? Math.round(correctCount / answeredCount * 100) : 0;

  document.getElementById('stat-progress').textContent = 'Q ' + (currentIdx + 1) + ' / ' + questions.length;
  document.getElementById('stat-correct').textContent  = '✓ ' + correctCount;
  document.getElementById('stat-wrong').textContent    = '✗ ' + wrongCount;
  document.getElementById('stat-score').textContent    = pct + '%';
}

function updateProgress() {
  const pct = ((currentIdx + 1) / questions.length * 100).toFixed(1);
  document.getElementById('progress-bar').style.width = pct + '%';
}

// ─── Results ──────────────────────────────────────────────────────────────────
function calcStats() {
  const keys = Object.keys(answers);
  const answeredCount = keys.length;
  const correctCount = keys.filter(i => {
    const q = questions[+i];
    return q && answers[i] === q.answer;
  }).length;
  return {
    answered: answeredCount,
    correct: correctCount,
    wrong: answeredCount - correctCount,
    remaining: questions.length - answeredCount,
    pct: answeredCount > 0 ? Math.round(correctCount / answeredCount * 100) : 0
  };
}

function showResults() {
  document.getElementById('question-area').style.display = 'none';
  document.getElementById('q-grid-wrap').style.display = 'none';
  document.getElementById('results-panel').style.display = 'block';

  const s = calcStats();
  document.getElementById('ring-pct').textContent = s.pct + '%';
  document.getElementById('r-answered').textContent  = s.answered;
  document.getElementById('r-correct').textContent   = s.correct;
  document.getElementById('r-wrong').textContent     = s.wrong;
  document.getElementById('r-remaining').textContent = s.remaining;

  const circle = document.getElementById('ring-circle');
  const offset = 314 - (s.pct / 100 * 314);
  circle.style.strokeDashoffset = offset;
  circle.style.stroke = s.pct >= 83 ? 'var(--green)' : s.pct >= 60 ? 'var(--gold)' : 'var(--red)';
  document.getElementById('ring-pct').style.color =
    s.pct >= 83 ? 'var(--green)' : s.pct >= 60 ? 'var(--gold)' : 'var(--red)';

  const grades = [
    [90, '🏆 Excellent — Exam Ready!'],
    [83, '✅ Passing Score Achieved!'],
    [70, '📈 Good — Keep Studying'],
    [50, '⚠️ Needs Improvement'],
    [0,  '📚 Keep Practicing']
  ];
  document.getElementById('results-grade').textContent = grades.find(([t]) => s.pct >= t)[1];
}

function closeResults() {
  document.getElementById('results-panel').style.display = 'none';
  document.getElementById('question-area').style.display = 'block';
  document.getElementById('q-grid-wrap').style.display = 'block';
}

function reviewWrong() {
  const wrongItems = Object.keys(answers)
    .filter(i => { const q = questions[+i]; return q && answers[i] !== q.answer; })
    .map(i => questions[+i]);
  if (!wrongItems.length) { alert('No wrong answers yet!'); return; }
  questions = wrongItems;
  answers = {};
  flagged.clear();
  currentIdx = 0;
  closeResults();
  buildGrid();
  renderQuestion(0);
  updateStats();
}

// ─── Start Quiz (sized) ───────────────────────────────────────────────────────
function startQuiz() {
  const size = document.getElementById('quiz-size-select').value;
  // Shuffle ALL_QUESTIONS, then slice to requested count
  const arr = [...ALL_QUESTIONS];
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  questions = size === 'all' ? arr : arr.slice(0, parseInt(size, 10));
  answers = {};
  flagged.clear();
  currentIdx = 0;
  selectedLetter = null;
  document.getElementById('flag-count').textContent = '0';
  document.getElementById('results-panel').style.display = 'none';
  document.getElementById('question-area').style.display = 'block';
  document.getElementById('q-grid-wrap').style.display = 'block';
  buildGrid();
  renderQuestion(0);
  updateStats();
}

// ─── Shuffle ──────────────────────────────────────────────────────────────────
function shuffleQuestions() {
  const arr = [...ALL_QUESTIONS];
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  questions = arr;
  answers = {};
  flagged.clear();
  currentIdx = 0;
  document.getElementById('flag-count').textContent = '0';
  buildGrid();
  renderQuestion(0);
  updateStats();
}

// ─── Show Flagged ─────────────────────────────────────────────────────────────
function showFlagged() {
  if (!flagged.size) { alert('No flagged questions!'); return; }
  // Collect the actual question objects for flagged indices
  const flaggedItems = [...flagged].map(i => questions[i]).filter(Boolean);
  questions = flaggedItems;
  answers = {};
  flagged.clear();
  currentIdx = 0;
  document.getElementById('flag-count').textContent = '0';
  buildGrid();
  renderQuestion(0);
  updateStats();
}

// ─── Reset ────────────────────────────────────────────────────────────────────
function resetAll() {
  if (!confirm('Reset all progress and start over?')) return;
  questions = [...ALL_QUESTIONS];
  answers = {};
  flagged.clear();
  selectedLetter = null;
  currentIdx = 0;
  document.getElementById('flag-count').textContent = '0';
  document.getElementById('results-panel').style.display = 'none';
  document.getElementById('question-area').style.display = 'block';
  document.getElementById('q-grid-wrap').style.display = 'block';
  buildGrid();
  renderQuestion(0);
  updateStats();
}

// ─── Mode toggle ──────────────────────────────────────────────────────────────
document.getElementById('mode-select').addEventListener('change', function() {
  mode = this.value;
  renderQuestion(currentIdx);
});

// ─── Search ───────────────────────────────────────────────────────────────────
document.getElementById('search-input').addEventListener('keydown', function(e) {
  if (e.key !== 'Enter') return;
  const val = this.value.trim();
  if (!val) return;

  // Try Q number
  const num = parseInt(val, 10);
  if (!isNaN(num)) {
    const idx = questions.findIndex(q => q.num === num);
    if (idx >= 0) { goTo(idx); this.value = ''; return; }
  }

  // Keyword search
  const kw = val.toLowerCase();
  const idx = questions.findIndex(q =>
    (q.q || '').toLowerCase().includes(kw) ||
    (q.A || '').toLowerCase().includes(kw) ||
    (q.B || '').toLowerCase().includes(kw)
  );
  if (idx >= 0) { goTo(idx); this.value = ''; }
  else alert('No matching question found.');
});

// ─── Start ────────────────────────────────────────────────────────────────────
init();
</script>
